services:
  postgres:
    image: postgres:18-alpine
    container_name: koda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: koda
      POSTGRES_PASSWORD: koda
      POSTGRES_DB: kodatrack
    ports:
      - "5432:5432"
    volumes:
      - koda_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koda -d kodatrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: koda-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - koda_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  koda_pgdata:
  koda_redisdata:
